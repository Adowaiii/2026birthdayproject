<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Tea Party · 生日茶會</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Taipei+Sans+TC:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Taipei Sans TC', sans-serif;
      background: #0e0e18;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      overflow-x: hidden;
    }

    /* starfield */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 30%, rgba(255,255,255,0.22) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 75%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.20) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.18) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    .site-eyebrow {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 1rem;
    }
    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 4.5vw, 2.9rem);
      font-weight: 700; color: #fff;
      line-height: 1.15; margin-bottom: 0.5rem;
    }
    .site-title .zh {
      display: block;
      font-family: 'Taipei Sans TC', sans-serif;
      font-size: 0.45em; font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.14em; margin-top: 0.45rem;
    }
    .site-sub { font-size: 0.82rem; color: rgba(255,255,255,0.28); letter-spacing: 0.1em; }

    /* ── CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .card {
      position: relative; border-radius: 28px; overflow: hidden;
      text-decoration: none; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3.5rem 2rem 2.8rem; min-height: 400px;
      transition: transform 0.35s cubic-bezier(0.34,1.1,0.64,1), box-shadow 0.35s ease;
    }
    .card:hover { transform: translateY(-10px) scale(1.02); }
    .card--saki {
      background: linear-gradient(145deg, #c2185b 0%, #E91E63 45%, #F06292 100%);
      box-shadow: 0 12px 50px rgba(233,30,99,0.35);
    }
    .card--saki:hover { box-shadow: 0 20px 60px rgba(233,30,99,0.50); }
    .card--tsukasa {
      background: linear-gradient(145deg, #1A4F7A 0%, #2C7BB6 45%, #5BA3D4 100%);
      box-shadow: 0 12px 50px rgba(44,123,182,0.35);
    }
    .card--tsukasa:hover { box-shadow: 0 20px 60px rgba(44,123,182,0.50); }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── EMBLEM ── */
    .card-emblem {
      position: relative; width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2rem;
    }
    .card-ring-outer {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.12);
      animation: spin-rev 6s linear infinite;
    }
    .card-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid transparent; animation: spin 3s linear infinite;
    }
    .card--saki .card-ring {
      border-top-color: rgba(255,255,255,0.9); border-right-color: rgba(255,214,0,0.6);
      border-bottom-color: rgba(255,255,255,0.2); border-left-color: rgba(255,255,255,0.2);
    }
    .card--tsukasa .card-ring {
      border-top-color: rgba(255,255,255,0.9); border-right-color: rgba(255,209,102,0.7);
      border-bottom-color: rgba(255,255,255,0.2); border-left-color: rgba(255,255,255,0.2);
    }
    .card-icon {
      font-size: 3rem; line-height: 1;
      animation: pulse 2.4s ease-in-out infinite;
      text-shadow: 0 0 24px rgba(255,255,255,0.6);
    }
    .card--saki   .card-icon { color: #F8BBD0; }
    .card--tsukasa .card-icon { color: #B3E0F7; }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes spin-rev { to { transform: rotate(-360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(0.90); }
      50%       { opacity: 1;   transform: scale(1.10); }
    }

    /* ── CARD TEXT ── */
    .card-body { text-align: center; color: #fff; }
    .card-date {
      display: inline-block; font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.22rem 0.85rem; border-radius: 20px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      margin-bottom: 0.75rem;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 2.8vw, 1.85rem);
      font-weight: 700; line-height: 1.1; margin-bottom: 0.3rem;
    }
    .card-name-zh {
      display: block; font-family: 'Taipei Sans TC', sans-serif;
      font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.14em; opacity: 0.7; margin-bottom: 1.2rem;
    }
    .card-cta {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 1.3rem; border-radius: 20px;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.28); color: #fff;
      transition: gap 0.2s, background 0.2s;
    }
    .card--tsukasa .card-cta {
      background: rgba(255,209,102,0.22); border-color: rgba(255,209,102,0.4); color: #FFD166;
    }
    .card:hover .card-cta { gap: 0.8rem; background: rgba(255,255,255,0.28); }
    .card--tsukasa:hover .card-cta { background: rgba(255,209,102,0.38); }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center; margin-top: 3rem;
      font-size: 0.75rem; color: rgba(255,255,255,0.2); letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      .cards { grid-template-columns: 1fr; gap: 1.5rem; max-width: 340px; margin: 0 auto; }
      .card { min-height: 340px; padding: 2.8rem 1.5rem 2.2rem; }
      .card-emblem { width: 100px; height: 100px; margin-bottom: 1.5rem; }
      .card-icon { font-size: 2.5rem; }
      .site-header { margin-bottom: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <header class="site-header">
      <span class="site-eyebrow">Project Sekai Fan Event</span>
      <h1 class="site-title">
        Birthday Tea Party
        <span class="zh">2026 生日茶會</span>
      </h1>
      <p class="site-sub">Click To View Event Info · 點擊閱覽活動資訊</p>
    </header>

    <div class="cards">

      <!-- Saki -->
      <a class="card card--saki" href="saki.html">
        <div class="card-emblem">
          <div class="card-ring-outer"></div>
          <div class="card-ring"></div>
          <span class="card-icon">❀</span>
        </div>
        <div class="card-body">
          <span class="card-date">2026.05.09</span>
          <p class="card-name">
            Tenma Saki
            <span class="card-name-zh">天馬咲希 生日茶會</span>
          </p>
          <span class="card-cta">Enter →</span>
        </div>
      </a>

      <!-- Tsukasa -->
      <a class="card card--tsukasa" href="tsukasa.html">
        <div class="card-emblem">
          <div class="card-ring-outer"></div>
          <div class="card-ring"></div>
          <span class="card-icon">✦</span>
        </div>
        <div class="card-body">
          <span class="card-date">2026.05.17</span>
          <p class="card-name">
            Tenma Tsukasa
            <span class="card-name-zh">天馬司 生日茶會</span>
          </p>
          <span class="card-cta">Enter →</span>
        </div>
      </a>

    </div>

    <footer class="site-footer">
      天馬咲希 &amp; 天馬司 Birthday Tea Party 2026
    </footer>

  </div>
</body>
</html>
